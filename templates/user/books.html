{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Library - Browse Books</title>
    <link rel="stylesheet" href="{% static 'assets/style.css' %}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="books-page-body">
    <!-- Navigation Bar -->
    <header class="header">
        <nav class="navbar">
            <div class="navbar-left">
                <div class="logo">Nexus Library</div>
                <div class="nav-links">
                    <a href="/" class="nav-link">Home</a>
                    <a href="#" class="nav-link active">Books</a>
                    <a href="/users/borrowedbooks/" class="nav-link">My Books</a>
                </div>
            </div>
            <div class="navbar-right">
                <button class="icon-btn" title="notifications">
                    <span class="material-icons">notifications</span>
                </button>
                <button class="icon-btn" title="search">
                    <span class="material-icons">search</span>
                </button>
                <a href="/users/dashboard" class="user-profile">
                    <img src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1499440383i/17251583.jpg" alt="User profile" class="profile-img">
                </a>
            </div>
        </nav>
    </header>

    <main class="books-page-container">
        <!-- Sidebar with Filters -->
        <aside class="books-sidebar">
            <!-- Categories Filter -->
            <div class="filter-section">
                <label class="filter-section-title">Categories</label>
                <div class="filter-option">
                    <input type="checkbox" id="cat-tech" name="category" value="tech" checked>
                    <label for="cat-tech">Tech</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-fiction" name="category" value="fiction" checked>
                    <label for="cat-fiction">Fiction</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-history" name="category" value="history">
                    <label for="cat-history">History</label>
                </div>
            </div>

            <!-- Availability Filter -->
            <div class="filter-section">
                <label class="filter-section-title">Availability</label>
                <div class="filter-option">
                    <input type="checkbox" id="avail-available" name="availability" value="available" checked>
                    <label for="avail-available">Available now</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="avail-borrowed" name="availability" value="borrowed">
                    <label for="avail-borrowed">Borrowed</label>
                </div>
            </div>

            <!-- Author Filter -->
            <div class="filter-section">
                <label class="filter-section-title">Author</label>
                <div class="filter-option">
                    <input type="checkbox" id="author-asimov" name="author" value="isaac-asimov">
                    <label for="author-asimov">Isaac Asimov</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="author-dick" name="author" value="philip-k-dick">
                    <label for="author-dick">Philip K. Dick</label>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="author-clarke" name="author" value="arthur-c-clarke">
                    <label for="author-clarke">Arthur C. Clarke</label>
                </div>
            </div>

            <!-- Publication Year Filter -->
            <div class="filter-section">
                <label class="filter-section-title">Publication Year</label>
                <div class="year-range-display">
                    <span>1950</span>
                    <span id="yearDisplay">2024</span>
                </div>
                <div class="publication-year-slider">
                    <input type="range" id="yearSlider" min="1950" max="2024" value="2024" class="year-slider">
                </div>
            </div>

            <!-- Apply Filters Button -->
            <button class="btn-apply-filters" id="applyFiltersBtn">Apply Filters</button>
        </aside>

        <!-- Main Content -->
        <section class="books-main-content">
            <!-- Search Results Header -->
            <div class="search-results-header">
                <div>
                    <h1 class="search-results-title">Search results for 'Science Fiction'</h1>
                    <p class="search-results-info">Showing 1-12 of 156 books found in the library</p>
                </div>
                <div class="results-controls">
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="Grid view">
                            <span class="material-icons">dashboard</span>
                        </button>
                        <button class="view-btn" data-view="list" title="List view">
                            <span class="material-icons">list</span>
                        </button>
                    </div>
                    <select class="sort-dropdown">
                        <option>Sort by</option>
                        <option>Newest</option>
                        <option>Oldest</option>
                        <option>Highest Rated</option>
                        <option>Lowest Price</option>
                        <option>Title (A-Z)</option>
                    </select>
                </div>
            </div>

            <!-- Search Results Grid -->
            <div class="search-results-grid" id="searchResultsGrid">
                <!-- Book Result Cards -->
                 {% for i in books %}
                <div class="result-book-card" >
                    <img src="{{i.image.url}}" alt="Foundation by Isaac Asimov">
                    <div class="result-book-header">
                        <span class="result-availability">stock : {{ i.stock }}</span>
                    </div>
                    <div class="result-book-info">
                        <h3 class="result-book-title">{{ i.title|truncatechars:26 }}</h3>
                        <p class="result-book-author">{{ i.author }}</p>
                        <div class="result-book-actions">
                            <button class="btn-small btn-borrow-small">Borrow</button>
                            <button class="btn-small btn-wishlist-small">add wishlist</button>
                        </div>
                    </div>
                </div>
                {% endfor %}
                

                
            </div>
        </section>
    </main>

    <script src="{% static 'assets/script.js' %}"></script>
</body>
</html>
